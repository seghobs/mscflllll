<div id="settingsModal" class="modal-backdrop hidden">
        <div class="modal-card fade-in" style="max-width:560px">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h3 class="text-xl font-bold tracking-tight">Ayarlar</h3>
                    <p class="text-xs text-zinc-500 font-medium">Token Yönetimi</p>
                </div>
                <button onclick="closeSettings()" class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-xmark text-sm"></i></button>
            </div>

            <div class="flex items-center gap-2 mb-4">
                <button onclick="switchTab('tokens')" id="tabTokens" class="flex-1 py-2 text-xs font-bold bg-zinc-800 text-white rounded transition">Aktif Tokenlar</button>
                <button onclick="switchTab('accounts')" id="tabAccounts" class="flex-1 py-2 text-xs font-bold bg-zinc-900 text-zinc-500 rounded transition">Hesaplar</button>
                <button onclick="switchTab('bot')" id="tabBot" class="flex-1 py-2 text-xs font-bold bg-zinc-900 text-zinc-500 rounded transition">Hesap Üretici</button>
            </div>

            <!-- Tab: Tokens -->
            <div id="viewTokens" class="space-y-4">
                <div id="tokenList" class="space-y-2 mb-4 max-h-72 overflow-y-auto pr-1"></div>
            </div>

            <!-- Tab: Accounts -->
            <div id="viewAccounts" class="hidden space-y-4">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-xs text-zinc-500">Sistemdeki tüm kayıtlı hesaplar.</div>
                    <select id="accountsSort" onchange="applyAccountSort()" class="bg-zinc-900 border border-zinc-800 text-zinc-400 text-[10px] font-bold rounded px-2 py-1 outline-none cursor-pointer">
                        <option value="credits_desc">Kredi (En Yüksek)</option>
                        <option value="credits_asc">Kredi (En Düşük)</option>
                        <option value="newest">Tarih (En Yeni)</option>
                        <option value="oldest">Tarih (En Eski)</option>
                    </select>
                </div>
                <div id="accountsList" class="space-y-2 max-h-96 overflow-y-auto pr-1"></div>
            </div>

            <!-- Tab: Bot -->
            <div id="viewBot" class="hidden space-y-4">
                <div class="bg-zinc-900/50 border border-zinc-800 rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-sm font-bold text-white">Musicful Hesap Üretici</h4>
                        <span id="botStatusBadge" class="bg-zinc-800 text-zinc-400 text-[10px] px-2 py-1 rounded font-bold uppercase">Beklemede</span>
                    </div>
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1">Üretilecek Hesap Sayısı</label>
                            <input type="number" id="botCount" class="shadcn-input w-full px-4 py-2 text-sm" value="1" min="1">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-zinc-500 mb-1">Varsayılan Şifre</label>
                            <input type="text" id="botPassword" class="shadcn-input w-full px-4 py-2 text-sm" value="MusicfulPass123!">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startBot()" id="btnStartBot" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition">Başlat</button>
                        <button onclick="stopBot()" id="btnStopBot" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-2 rounded transition hidden">Durdur</button>
                    </div>
                    
                    <div id="botParentInfo" class="mt-4 hidden p-3 bg-emerald-900/20 border border-emerald-900/50 rounded-lg flex items-center justify-between">
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Aktif Referans:</span>
                        <span id="botParentEmailText" class="text-xs font-bold text-emerald-300">Bekleniyor...</span>
                    </div>

                    <div id="botProgress" class="mt-4 hidden">
                        <div class="flex justify-between text-[10px] font-bold text-zinc-400 mb-1">
                            <span id="botProgressText">0 / 0</span>
                            <span id="botProgressPercent">0%</span>
                        </div>
                        <div class="w-full bg-zinc-800 rounded-full h-1.5">
                            <div id="botProgressBar" class="bg-emerald-500 h-1.5 rounded-full transition-all" style="width:0%"></div>
                        </div>
                    </div>
                    <div class="mt-4 bg-black/50 border border-zinc-800 rounded p-3 text-[10px] font-mono text-zinc-400 h-32 overflow-y-auto" id="botConsole">
                        Hazır...
                    </div>
                </div>
            </div>
        </div>
    </div>

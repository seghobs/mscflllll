<div id="editTokenModal" class="modal-backdrop hidden">
        <div class="modal-card fade-in" style="max-width:480px">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h3 class="text-xl font-bold tracking-tight">Token Düzenle</h3>
                </div>
                <button onclick="closeEditModal()" class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-xmark text-sm"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">İsim</label>
                    <input type="text" id="editTokenName" class="shadcn-input w-full px-4 py-2.5 text-sm" placeholder="Token adı">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Token Değeri</label>
                    <textarea id="editTokenValue" class="shadcn-input w-full px-4 py-2.5 text-sm font-mono resize-y" rows="4" placeholder="Bearer token..."></textarea>
                </div>
            </div>
            <div class="flex gap-2 mt-8">
                <button onclick="closeEditModal()" class="shadcn-button-secondary flex-1 py-2.5 text-sm">İptal</button>
                <button onclick="saveEditToken()" class="shadcn-button-primary flex-1 py-2.5 text-sm">
                    Kaydet
                </button>
            </div>
        </div>
    </div>

<div id="videoModal" class="modal-backdrop hidden">
    <div class="modal-card fade-in">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h3 class="text-xl font-bold tracking-tight">Klip Hazırla</h3>
                <p id="modalSongName" class="text-xs text-zinc-500 font-medium"></p>
            </div>
            <button onclick="closeVideoModal()" class="text-zinc-500 hover:text-white transition"><i class="fa-solid fa-xmark text-sm"></i></button>
        </div>

        <!-- Step: Image Upload -->
        <div id="videoStep1">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button id="aiGenerateBtn" onclick="generateAiCover()" class="bg-zinc-900 border border-zinc-800 rounded-lg p-6 flex flex-col items-center justify-center gap-3 hover:bg-zinc-800 transition group">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl text-zinc-400 group-hover:text-white transition"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-zinc-500 group-hover:text-white transition text-center">AI Tasarım</span>
                </button>
                <div class="bg-zinc-950 border-2 border-dashed border-zinc-800 rounded-lg p-6 flex flex-col items-center justify-center gap-3 hover:bg-zinc-900 transition cursor-pointer group" id="imgDropzone">
                    <input type="file" id="imgInput" accept="image/*" class="hidden">
                    <div id="imgDropContent" class="text-center">
                        <i class="fa-solid fa-image text-xl text-zinc-600 group-hover:text-zinc-400 transition"></i>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Görsel Yükle</div>
                    </div>
                </div>
            </div>

            <div id="aiGenerating" class="hidden my-6 text-center py-4 bg-zinc-900 border border-zinc-800 rounded-lg">
                <i class="fa-solid fa-spinner fa-spin text-zinc-500 mb-2"></i>
                <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-400">AI Tasarlıyor...</div>
            </div>

            <div id="imgPreviewWrapper" class="hidden mt-4 relative group">
                <img id="imgPreview" class="w-full max-h-48 object-contain rounded-lg border border-zinc-800">
                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all rounded-lg">
                    <button onclick="resetCoverSelection()" class="bg-zinc-900 border border-zinc-700 text-white px-4 py-2 rounded-md text-xs font-bold transition">KALDIR</button>
                </div>
            </div>
            <div id="imgInfo" class="hidden mt-3 flex items-center justify-between text-xs text-zinc-500">
                <span id="imgName"></span>
                <span id="imgDimensions"></span>
            </div>
            <button id="createVideoBtn" onclick="createVideo()" class="shadcn-button-primary mt-8 py-3 text-sm w-full flex items-center justify-center gap-3 disabled:opacity-30" disabled>
                <i class="fa-solid fa-wand-magic-sparkles text-xs"></i> Klip Oluştur
            </button>
        </div>

        <!-- Step: Processing -->
        <div id="videoStep2" class="hidden">
            <div class="flex flex-col items-center py-6">
                <div class="w-16 h-16 bg-zinc-900 border border-zinc-800 rounded-lg flex items-center justify-center mb-4">
                    <i class="fa-solid fa-spinner fa-spin text-xl text-white"></i>
                </div>
                <div id="videoProgressText" class="text-sm font-medium mb-3">Video oluşturuluyor...</div>
                <div class="w-full bg-zinc-900 border border-zinc-800 rounded-full h-2 overflow-hidden">
                    <div id="videoProgress" class="bg-white h-full rounded-full transition-all duration-500" style="width:100%"></div>
                </div>
                <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-4">Lütfen bekleyin...</div>
            </div>
        </div>

        <!-- Step: Done -->
        <div id="videoStep3" class="hidden">
            <div class="flex flex-col items-center py-4">
                <div class="w-14 h-14 bg-zinc-900 border border-zinc-800 rounded-lg flex items-center justify-center mb-4">
                    <i class="fa-solid fa-check text-xl text-white"></i>
                </div>
                <div class="text-sm font-bold tracking-tight mb-4">Videonuz Hazır!</div>
                <a id="videoDownloadLink" href="#" download class="shadcn-button-primary w-full py-3 text-sm flex items-center justify-center gap-3 mb-6">
                    <i class="fa-solid fa-download"></i> İndir (.mp4)
                </a>

                <!-- SEO Generator -->
                <div class="w-full border-t border-zinc-800 pt-6 mt-4">
                    <button id="seoBtn" onclick="generateSEO()" class="shadcn-button-secondary py-3 text-xs w-full flex items-center justify-center gap-2">
                        <i class="fa-solid fa-bolt text-[10px]"></i> SEO Önerisi Al
                    </button>
                    <div id="seoLoading" class="hidden text-center py-4">
                        <i class="fa-solid fa-spinner fa-spin text-zinc-500 text-xs mb-1"></i>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Analiz Ediliyor...</div>
                    </div>
                    
                    <div id="seoForms" class="hidden w-full space-y-4 mt-6 text-left">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Başlık</label>
                            <input type="text" id="ytUploadTitle" class="shadcn-input w-full px-4 py-2 text-xs">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Açıklama</label>
                            <textarea id="ytUploadDesc" rows="4" class="shadcn-input w-full px-4 py-2 text-xs resize-y"></textarea>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Etiketler</label>
                            <input type="text" id="ytUploadTags" class="shadcn-input w-full px-4 py-2 text-xs" placeholder="etiket1, etiket2...">
                        </div>
                        <button id="ytUploadBtn" onclick="uploadToYouTube()" class="shadcn-button-primary w-full py-3 text-sm flex items-center justify-center gap-3 mt-6">
                            <i class="fa-brands fa-youtube text-lg"></i> YouTube'a Yükle
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error -->
        <div id="videoError" class="hidden">
            <div class="flex flex-col items-center py-4">
                <div class="w-16 h-16 bg-red-500/10 border border-red-500/20 rounded-lg flex items-center justify-center mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
                </div>
                <div id="videoErrorMsg" class="text-sm text-red-500 text-center mb-6"></div>
                <button onclick="resetVideoModal()" class="shadcn-button-secondary px-6 py-2 text-sm">Tekrar Dene</button>
            </div>
        </div>
    </div>
</div>

<!-- Cover Title Confirm Modal -->
<div id="coverConfirmModal" class="modal-backdrop hidden" style="z-index:10001;">
    <div class="shadcn-card p-6 w-[90%] max-w-md shadow-2xl">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h4 class="text-sm font-bold uppercase tracking-widest text-white">Görsel Oluştur</h4>
            </div>
            <button onclick="closeCoverConfirmModal()" class="text-zinc-500 hover:text-white">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
        </div>
        
        <div class="mb-6">
            <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Başlık</label>
            <input type="text" id="coverTitleInput" 
                class="shadcn-input w-full px-4 py-3 text-sm"
                placeholder="Şarkı başlığını girin">
        </div>
        
        <div class="flex gap-2">
            <button onclick="closeCoverConfirmModal()" 
                class="shadcn-button-secondary flex-1 py-3 text-sm">
                İptal
            </button>
            <button onclick="confirmCoverGenerate()" 
                class="shadcn-button-primary flex-1 py-3 text-sm">
                Oluştur
            </button>
        </div>
    </div>
</div>

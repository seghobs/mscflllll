<div id="videoModal" class="modal-backdrop hidden">
        <div class="modal-card fade-in">
            <div class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-pink-500/20 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-film text-pink-400"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-lg">Video Oluştur</h3>
                        <p id="modalSongName" class="text-xs text-dark-400"></p>
                    </div>
                </div>
                <button onclick="closeVideoModal()" class="w-8 h-8 rounded-lg bg-dark-700 hover:bg-dark-600 flex items-center justify-center transition"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- Step: Image Upload -->
            <div id="videoStep1">
                <div class="grid grid-cols-2 gap-4 mb-3">
                    <button id="aiGenerateBtn" onclick="generateAiCover()" class="bg-dark-800 hover:bg-dark-700/80 rounded-xl p-4 flex flex-col items-center justify-center gap-2 border border-indigo-500/30 transition-all card-hover btn-glow">
                        <i class="fa-solid fa-wand-magic-sparkles text-2xl text-indigo-400"></i>
                        <span class="font-semibold text-xs text-indigo-100 mt-1 text-center">Yapay Zekadan<br>Oluştur</span>
                    </button>
                    <div class="modal-img-drop !mb-0 !border-indigo-500/30 h-full flex flex-col items-center justify-center !p-4" id="imgDropzone">
                        <input type="file" id="imgInput" accept="image/*" class="hidden">
                        <div id="imgDropContent" class="text-center">
                            <i class="fa-solid fa-image text-2xl text-dark-500 mb-2"></i>
                            <div class="text-dark-300 font-medium text-xs">Kapak Yükle</div>
                        </div>
                    </div>
                </div>

                <div id="aiGenerating" class="hidden my-4 text-center">
                    <i class="fa-solid fa-cog fa-spin text-indigo-400 text-2xl mb-2"></i>
                    <div class="text-sm text-dark-300">Yapay zeka kapak tasarlıyor...</div>
                    <div class="text-[10px] text-dark-500 mt-1">İşlem yaklaşık 10 saniye sürebilir</div>
                </div>

                <div id="imgPreviewWrapper" class="hidden mt-3 relative group">
                    <img id="imgPreview" class="w-full max-h-48 object-contain rounded-xl border border-dark-600">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all rounded-xl">
                        <button onclick="resetCoverSelection()" class="bg-red-500/20 hover:bg-red-500 text-red-300 hover:text-white px-4 py-2 rounded-xl text-xs font-semibold transition"><i class="fa-solid fa-trash mr-1"></i>Kaldır</button>
                    </div>
                </div>
                <div id="imgInfo" class="hidden mt-3 flex items-center justify-between text-xs text-dark-400">
                    <span id="imgName"></span>
                    <span id="imgDimensions"></span>
                </div>
                <button id="createVideoBtn" onclick="createVideo()" class="mt-5 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 px-6 py-3 rounded-xl font-semibold w-full flex items-center justify-center gap-2 transition-all btn-glow disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Klibi Oluştur
                </button>
            </div>

            <!-- Step: Processing -->
            <div id="videoStep2" class="hidden">
                <div class="flex flex-col items-center py-6">
                    <div class="w-16 h-16 bg-pink-500/20 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fa-solid fa-spinner fa-spin text-3xl text-pink-400"></i>
                    </div>
                    <div id="videoProgressText" class="text-sm text-dark-300 mb-3">Video oluşturuluyor...</div>
                    <div class="w-full bg-dark-800 rounded-full h-2 overflow-hidden">
                        <div id="videoProgress" class="bg-gradient-to-r from-pink-500 to-purple-500 h-full rounded-full transition-all duration-500 shimmer" style="width:100%"></div>
                    </div>
                    <div class="text-xs text-dark-500 mt-3">Bu işlem şarkının uzunluğuna göre değişir</div>
                </div>
            </div>

            <!-- Step: Done -->
            <div id="videoStep3" class="hidden">
                <div class="flex flex-col items-center py-4">
                    <div class="w-14 h-14 bg-green-500/20 rounded-2xl flex items-center justify-center mb-3">
                        <i class="fa-solid fa-check text-2xl text-green-400"></i>
                    </div>
                    <div class="text-sm font-semibold text-dark-300 mb-3">Videonuz İndirilmeye Hazır!</div>
                    <a id="videoDownloadLink" href="#" download class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 px-5 py-3.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all btn-glow mb-4">
                        <i class="fa-solid fa-download"></i> Klibi İndir (.mp4)
                    </a>

                    <!-- SEO Generator -->
                    <div class="w-full border-t border-dark-700 pt-4 mt-1">
                        <button id="seoBtn" onclick="generateSEO()" class="bg-dark-800 hover:bg-dark-700/80 border border-purple-500/30 px-4 py-3 rounded-xl font-semibold text-xs flex items-center justify-center gap-2 transition-all text-purple-300 w-full mb-2">
                            <i class="fa-solid fa-bolt"></i> YouTube Başlık & Etiket Önerisi Al
                        </button>
                        <div id="seoLoading" class="hidden text-center py-3">
                            <i class="fa-solid fa-cog fa-spin text-purple-400 text-lg mb-1"></i>
                            <div class="text-xs text-dark-400">Gemini Analiz Ediyor...</div>
                        </div>
                        
                        <div id="seoForms" class="hidden w-full space-y-3 mt-3 text-left">
                            <div>
                                <label class="block text-[11px] font-semibold text-dark-300 mb-1">Video Başlığı <span class="text-purple-400">(Gemini)</span></label>
                                <input type="text" id="ytUploadTitle" class="w-full bg-dark-900/50 border border-dark-600 rounded-lg px-3 py-2 text-xs text-white focus:border-purple-500 focus:outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-[11px] font-semibold text-dark-300 mb-1">Açıklama</label>
                                <textarea id="ytUploadDesc" rows="4" class="w-full bg-dark-900/50 border border-dark-600 rounded-lg px-3 py-2 text-xs text-white focus:border-purple-500 focus:outline-none transition-all resize-y"></textarea>
                            </div>
                            <div>
                                <label class="block text-[11px] font-semibold text-dark-300 mb-1">Etiketler (Virgülle ayırın)</label>
                                <textarea id="ytUploadTags" rows="2" class="w-full bg-dark-900/50 border border-dark-600 rounded-lg px-3 py-2 text-xs text-white focus:border-purple-500 focus:outline-none transition-all resize-none"></textarea>
                            </div>
                            <button id="ytUploadBtn" onclick="uploadToYouTube()" class="w-full bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 px-5 py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all btn-glow shadow-lg shadow-red-500/20 text-white mt-4">
                                <i class="fa-brands fa-youtube text-lg"></i> YouTube Kanalıma Yükle
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error -->
            <div id="videoError" class="hidden">
                <div class="flex flex-col items-center py-4">
                    <div class="w-16 h-16 bg-red-500/20 rounded-2xl flex items-center justify-center mb-4">
                        <i class="fa-solid fa-triangle-exclamation text-3xl text-red-400"></i>
                    </div>
                    <div id="videoErrorMsg" class="text-sm text-red-400 text-center"></div>
                    <button onclick="resetVideoModal()" class="mt-4 bg-dark-700 hover:bg-dark-600 px-6 py-2 rounded-xl text-sm transition">Tekrar Dene</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Cover Title Confirm Modal -->
    <div id="coverConfirmModal" class="modal-backdrop hidden" style="z-index:10001;">
        <div class="bg-dark-800 border border-dark-600 rounded-2xl p-5 w-[90%] max-w-md shadow-2xl">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-wand-magic-sparkles text-white text-lg"></i>
                </div>
                <div>
                    <h4 class="font-semibold text-white">Kapak Görseli Oluştur</h4>
                    <p class="text-xs text-dark-400">Başlığı düzenleyip onayla</p>
                </div>
                <button onclick="closeCoverConfirmModal()" class="ml-auto w-8 h-8 rounded-lg bg-dark-700 hover:bg-dark-600 flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            
            <div class="mb-4">
                <label class="block text-xs font-medium text-dark-300 mb-2">Görsel Başlığı</label>
                <input type="text" id="coverTitleInput" 
                    class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white text-sm focus:border-indigo-500 focus:outline-none"
                    placeholder="Şarkı başlığını girin">
            </div>
            
            <div class="flex gap-3">
                <button onclick="closeCoverConfirmModal()" 
                    class="flex-1 bg-dark-700 hover:bg-dark-600 py-3 rounded-xl font-medium text-sm transition">
                    İptal
                </button>
                <button onclick="confirmCoverGenerate()" 
                    class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 py-3 rounded-xl font-medium text-sm text-white flex items-center justify-center gap-2">
                    <i class="fa-solid fa-check"></i> Oluştur
                </button>
            </div>
        </div>
    </div>

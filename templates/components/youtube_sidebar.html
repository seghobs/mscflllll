<div id="ytVideosSidebar" class="fixed left-4 top-36 bottom-2 z-50 flex flex-col transition-all duration-500 ease-in-out -translate-x-[calc(100%+1rem)] md:w-56 w-72 md:left-4 left-0 md:rounded-lg rounded-none bg-zinc-950 border-r md:border border-zinc-800 shadow-2xl overflow-hidden">

            </div>
            <div id="ytVideosList" class="yt-sidebar-list">
